version: 1
frontend:
  phases:
    preBuild:
      commands:
        - nvm use 22
        - npm install --global pnpm@10.28.1
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: .next
    files:
      - "**/*"
  cache:
    paths:
      - .next/cache/**/*
      - node_modules/**/*
